# Netlify configuration. The Next.js runtime plugin is auto-detected.
[build]
  command = "npm run build"

# Stripe Functions (SPEC §5) — bundled with the esbuild bundler.
[functions]
  node_bundler = "esbuild"

# Security headers (Netlify already adds HSTS + X-Content-Type-Options).
# A full CSP is deferred — it needs a dedicated pass with GA, Cloudinary,
# and inline JSON-LD tested on a deploy preview.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# Old → new IA 301s (SPEC §2). Pre-launch, but kept for any shared links.
# Gallery (was /albums)
[[redirects]]
  from = "/albums"
  to = "/gallery"
  status = 301
  force = true

[[redirects]]
  from = "/albums/*"
  to = "/gallery/:splat"
  status = 301
  force = true

# Blog (was /guides)
[[redirects]]
  from = "/guides"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/guides/*"
  to = "/blog/:splat"
  status = 301
  force = true

# The old free-recipe route was live briefly before the store rework — anyone
# who saved or indexed it lands on the product instead of a 404.
[[redirects]]
  from = "/downloads/vanilla-summer"
  to = "/downloads/vanilla-summer-recipe-card"
  status = 301
  force = true

# Downloads (was /recipes)
[[redirects]]
  from = "/recipes"
  to = "/downloads"
  status = 301
  force = true

[[redirects]]
  from = "/recipes/*"
  to = "/downloads/:splat"
  status = 301
  force = true

# Prints store stays at /prints; /gear folded into /about
[[redirects]]
  from = "/gear"
  to = "/about"
  status = 301
  force = true
